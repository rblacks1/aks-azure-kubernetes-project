apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-webapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aks-webapp
  template:
    metadata:
      labels:
        app: aks-webapp
    spec:
      containers:
      - name: aks-webapp
        image: rkaksacr11728.azurecr.io/aks-webapp:1.0
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: aks-webapp-service
spec:
  type: LoadBalancer
  selector:
    app: aks-webapp
  ports:
  - port: 80
    targetPort: 3000